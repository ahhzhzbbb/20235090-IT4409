<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="https://www.google.com/favicon.ico">
</head>
<body>

    <!-- Header: thanh điều hướng phía trên gồm các liên kết Gmail, Hình ảnh và nút Đăng nhập -->
    <header>
        <table width="100%">
            <tr>
                <td align="right">
                    <a href="https://mail.google.com">Gmail</a>
                    &nbsp;&nbsp;
                    <a href="https://images.google.com">Hình ảnh</a>
                    &nbsp;&nbsp;&nbsp;
                    <a href="https://accounts.google.com"><b>Đăng nhập</b></a>
                </td>
            </tr>
        </table>
    </header>

    <br><br><br><br><br><br>

    <!-- Phần chính: logo Google, thanh tìm kiếm và các nút bấm -->
    <main>
        <center>
            <!-- Logo Google -->
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google" width="272" height="92">

            <br><br>

            <!-- Thanh tìm kiếm -->
            <form action="https://www.google.com/search" method="get">
                <table>
                    <tr>
                        <td>
                            <input type="text" name="q" size="60" maxlength="2048" title="Tìm kiếm">
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <br>
                            <input type="submit" value="Tìm trên Google">
                            &nbsp;&nbsp;
                            <input type="submit" value="Tôi Đang May Mắn">
                        </td>
                    </tr>
                </table>
            </form>

            <br>

            <!-- Gợi ý ngôn ngữ -->
            <small>
                Google có các ngôn ngữ:
                <a href="https://www.google.com/?hl=en">English</a>
                <a href="https://www.google.com/?hl=fr">Français</a>
                <a href="https://www.google.com/?hl=zh-CN">中文</a>
            </small>
        </center>
    </main>

    <br><br><br><br><br><br><br><br><br><br>

    <!-- Footer: thông tin quốc gia, các liên kết phụ và MSSV + ngày tạo -->
    <footer>
        <hr>
        <table width="100%" cellpadding="5">
            <tr>
                <td>Việt Nam</td>
            </tr>
        </table>
        <hr>
        <table width="100%" cellpadding="5">
            <tr>
                <td align="left">
                    <a href="#">Giới thiệu</a>
                    &nbsp;
                    <a href="#">Quảng cáo</a>
                    &nbsp;
                    <a href="#">Kinh doanh</a>
                    &nbsp;
                    <a href="#">Cách hoạt động của Tìm kiếm</a>
                </td>
                <td align="right">
                    <a href="#">Quyền riêng tư</a>
                    &nbsp;
                    <a href="#">Điều khoản</a>
                    &nbsp;
                    <a href="#">Cài đặt</a>
                </td>
            </tr>
        </table>
        <hr>
        <p align="center"><small>MSSV: 20235090 — Phạm Minh Hoàng | Ngày tạo: 08/03/2026</small></p>
    </footer>

</body>
</html>
